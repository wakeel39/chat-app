# Chat app Service (NodePort 30080)
apiVersion: v1
kind: Service
metadata:
  name: chat-app
  namespace: chat-app
  labels:
    app: chat-app
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app: chat-app
