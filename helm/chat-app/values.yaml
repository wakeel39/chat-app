# Base values for chat-app (shared by all environments).
#
# -----------------------------------------------------------------------------
# Argo CD: full defaults live inline in argocd/application-kind.yaml and
# argocd/application.yaml (helm.values + helm.parameters, feedus-style).
#
# Local Helm (no Argo): merge with an overlay that supplies image + secret, e.g.
#   helm template chat-app . -f values.yaml -f values-application-kind.yaml
# -----------------------------------------------------------------------------

# App replica count (ignored when autoscaling.enabled; use autoscaling.minReplicas)
replicaCount: 1

# Horizontal Pod Autoscaler (requires metrics-server on the cluster)
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Main chat-app Service — use ClusterIP when ingress.serviceClusterIPOnly + ingress enabled (traffic via ingress-nginx)
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  nodePort: null

# Ingress = L7 entry (install ingress-nginx on Kind; DNS A/AAAA for host → EC2). Acts as API gateway + load balancer to pods.
ingress:
  enabled: false
  className: nginx
  host: chat.sardar.cloud
  # When true with ingress.enabled, Service type is forced to ClusterIP (no NodePort on chat-app).
  serviceClusterIPOnly: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  tls: false
  tlsSecretName: chat-app-tls

# App env (ConfigMap)
config:
  PORT: "3000"
  MONGO_URI: "mongodb://mongo:27017/chatapp"
  REDIS_URL: "redis://redis:6379"

# Resources for the chat-app container
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# MongoDB (in-cluster)
mongo:
  enabled: true
  image: mongo:7
  storage: 5Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# Redis (in-cluster)
redis:
  enabled: true
  image: redis:7
  storage: 1Gi
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
