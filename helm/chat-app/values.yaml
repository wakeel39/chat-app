# Base values for chat-app (shared by all environments).
#
# -----------------------------------------------------------------------------
# Argo CD: full defaults live inline in argocd/application-kind.yaml and
# argocd/application.yaml (helm.values + helm.parameters, feedus-style).
#
# Local Helm (no Argo): merge with an overlay that supplies image + secret, e.g.
#   helm template chat-app . -f values.yaml -f values-application-kind.yaml
# -----------------------------------------------------------------------------

# App replica count
replicaCount: 1

# Main chat-app Service — Argo Kind uses NodePort 30080 + Kind hostPort 3000 (see kind/kind-config-ec2-public-3000.yaml)
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  # For EC2 :3000 access with Kind: use NodePort 30080 (see argocd/application-kind.yaml)
  nodePort: null

# Optional Ingress (e.g. ingress-nginx on NodePort; still ClusterIP behind controller)
ingress:
  enabled: false
  className: nginx
  host: chat.example.com
  annotations: {}
  tls: false
  tlsSecretName: chat-app-tls

# App env (ConfigMap)
config:
  PORT: "3000"
  MONGO_URI: "mongodb://mongo:27017/chatapp"
  REDIS_URL: "redis://redis:6379"

# Resources for the chat-app container
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# MongoDB (in-cluster)
mongo:
  enabled: true
  image: mongo:7
  storage: 5Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# Redis (in-cluster)
redis:
  enabled: true
  image: redis:7
  storage: 1Gi
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
