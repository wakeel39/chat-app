apiVersion: v1
kind: Secret
metadata:
  name: chat-app-secret
  namespace: {{ include "chat-app.name" . }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secret.jwtSecret is required (use values-application-kind.yaml or values-application-eks.yaml)" .Values.secret.jwtSecret | quote }}
