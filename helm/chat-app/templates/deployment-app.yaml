apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-app
  namespace: {{ include "chat-app.name" . }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app: chat-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: chat-app
  template:
    metadata:
      labels:
        app: chat-app
        {{- include "chat-app.labels" . | nindent 8 }}
    spec:
      containers:
        - name: chat-app
          image: {{ include "chat-app.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: chat-app-config
            - secretRef:
                name: chat-app-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chat-app
  namespace: {{ include "chat-app.name" . }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app: chat-app
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: chat-app
