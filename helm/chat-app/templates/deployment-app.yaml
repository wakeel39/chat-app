apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-app
  namespace: {{ include "chat-app.name" . }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app: chat-app
spec:
  {{- if .Values.autoscaling.enabled }}
  replicas: {{ .Values.autoscaling.minReplicas }}
  {{- else }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: chat-app
  template:
    metadata:
      labels:
        app: chat-app
        {{- include "chat-app.labels" . | nindent 8 }}
    spec:
      containers:
        - name: chat-app
          image: {{ include "chat-app.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: chat-app-config
            - secretRef:
                name: chat-app-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: chat-app
  namespace: {{ include "chat-app.name" . }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app: chat-app
spec:
  {{- if and .Values.ingress.enabled .Values.ingress.serviceClusterIPOnly }}
  type: ClusterIP
  {{- else }}
  type: {{ .Values.service.type }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
      {{- $directNp := and (not (and .Values.ingress.enabled .Values.ingress.serviceClusterIPOnly)) (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      {{- if $directNp }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    app: chat-app
