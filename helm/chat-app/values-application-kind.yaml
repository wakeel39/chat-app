# -----------------------------------------------------------------------------
# Local Helm / reference overlay (image + secret). Argo Kind deploy uses inline
# helm.values in argocd/application-kind.yaml — keep this file in sync when you
# change Kind image defaults, or edit the Application manifest directly.
# -----------------------------------------------------------------------------
# Align service with application-kind.yaml when using EC2 public port 3000 + Kind config.
service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30080

image:
  repository: sardarabdulwakeel/chat-app
  tag: latest
  pullPolicy: Always

secret:
  jwtSecret: "dev-secret-change-me"
