# -----------------------------------------------------------------------------
# Local Helm overlay aligned with argocd/application-kind.yaml (Kind + sardar.cloud).
# -----------------------------------------------------------------------------
replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

ingress:
  enabled: true
  className: nginx
  host: chat.sardar.cloud
  serviceClusterIPOnly: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "chat-app-affinity"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
  tls: false
  tlsSecretName: chat-app-tls

image:
  repository: sardarabdulwakeel/chat-app
  tag: latest
  pullPolicy: Always

secret:
  jwtSecret: "dev-secret-change-me"
