# Replace placeholder with base64-encoded JWT_SECRET before applying.
# kubectl create secret generic chat-app-secret -n chat-app \
#   --from-literal=JWT_SECRET=your-production-secret \
#   --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: chat-app-secret
  namespace: chat-app
  labels:
    app: chat-app
type: Opaque
stringData:
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"  # Override via sealed-secrets or external secrets in production
