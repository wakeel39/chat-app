# Argo CD Application (EKS / production-style) — same layout as application-kind: parameters + inline helm.values + retry.
# Apply: kubectl apply -f argocd/application.yaml
# CI: argocd app set chat-app --helm-set image.repository=ECR_URI --helm-set image.tag=...
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chat-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: chat-app
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      parameters:
        - name: resources.requests.cpu
          value: "100m"
        - name: resources.requests.memory
          value: "128Mi"
        - name: resources.limits.cpu
          value: "500m"
        - name: resources.limits.memory
          value: "512Mi"
        - name: replicaCount
          value: "1"
      values: |
        replicaCount: 1
        autoscaling:
          enabled: false
          minReplicas: 1
          maxReplicas: 3
          targetCPUUtilizationPercentage: 70
          targetMemoryUtilizationPercentage: 0
        image:
          repository: sardarabdulwakeel/chat-app
          tag: latest
          pullPolicy: Always
        service:
          type: ClusterIP
          port: 80
          targetPort: 3000
        ingress:
          enabled: false
          className: nginx
          host: api.sardar.cloud
          serviceClusterIPOnly: true
          annotations: {}
          tls: false
          tlsSecretName: chat-app-tls
        config:
          PORT: "3000"
          MONGO_URI: "mongodb://mongo:27017/chatapp"
          REDIS_URL: "redis://redis:6379"
        secret:
          jwtSecret: "CHANGE_ME_IN_PRODUCTION"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        mongo:
          enabled: true
          image: mongo:7
          storage: 5Gi
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
        redis:
          enabled: true
          image: redis:7
          storage: 1Gi
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      version: v3
    repoURL: https://github.com/wakeel39/chat-app.git
    targetRevision: "<RELEASE_TAG>"
    path: helm/chat-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
