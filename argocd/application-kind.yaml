# Argo CD Application (Kind) — structure aligned with inline helm.values + parameters + retry (feedus-style).
# Apply: kubectl apply -f argocd/application-kind.yaml
# CI: sed replaces <RELEASE_TAG>; deploy-new also runs: argocd app set --revision <tag> so the Argo UI
# shows the current Git version (not only helm-set image.tag).
#
# EC2 public access on port 3000 (this project’s Kind host):
#   1) Create Kind with kind/kind-config-ec2-public-3000.yaml (maps host :3000 → node NodePort 30080).
#   2) Service below uses type NodePort + nodePort 30080 (required range 30000–32767).
#   3) Open EC2 security group: inbound TCP 3000.
#   4) Open: http://ec2-35-173-185-92.compute-1.amazonaws.com:3000
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chat-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: chat-app
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      parameters:
        - name: resources.requests.cpu
          value: "100m"
        - name: resources.requests.memory
          value: "128Mi"
        - name: resources.limits.cpu
          value: "500m"
        - name: resources.limits.memory
          value: "512Mi"
        - name: replicaCount
          value: "1"
      values: |
        replicaCount: 1
        image:
          repository: sardarabdulwakeel/chat-app
          tag: latest
          pullPolicy: Always
        service:
          type: NodePort
          port: 80
          targetPort: 3000
          nodePort: 30080
        ingress:
          enabled: false
          className: nginx
          host: ec2-35-173-185-92.compute-1.amazonaws.com
          annotations: {}
          tls: false
          tlsSecretName: chat-app-tls
        config:
          PORT: "3000"
          MONGO_URI: "mongodb://mongo:27017/chatapp"
          REDIS_URL: "redis://redis:6379"
        secret:
          jwtSecret: "dev-secret-change-me"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        mongo:
          enabled: true
          image: mongo:7
          storage: 5Gi
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
        redis:
          enabled: true
          image: redis:7
          storage: 1Gi
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      version: v3
    repoURL: https://github.com/wakeel39/chat-app.git
    targetRevision: "<RELEASE_TAG>"
    path: helm/chat-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
