# Argo CD Application (Kind) — structure aligned with inline helm.values + parameters + retry (feedus-style).
# Apply: kubectl apply -f argocd/application-kind.yaml
# CI: sed replaces <RELEASE_TAG>; deploy-new also runs: argocd app set --revision <tag> so the Argo UI
# shows the current Git version (not only helm-set image.tag).
#
# Kind + EC2 + domain sardar.cloud:
#   1) Install ingress-nginx (see docs/KIND-SARDAR-CLOUD-INGRESS.md) — L7 load balancer to chat-app pods.
#   2) Install metrics-server (required for HPA horizontal scaling).
#   3) Create Kind with kind/kind-config-sardar-cloud-ingress.yaml (host :80 → ingress NodePort 30080).
#   4) Route53: A/AAAA chat.sardar.cloud → EC2 public IP (or ALB if you front with AWS LB).
#   5) EC2 security group: inbound TCP 80 (and 443 if TLS).
#   6) Open: http://chat.sardar.cloud
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chat-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: chat-app
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      parameters:
        - name: resources.requests.cpu
          value: "100m"
        - name: resources.requests.memory
          value: "128Mi"
        - name: resources.limits.cpu
          value: "500m"
        - name: resources.limits.memory
          value: "512Mi"
        - name: replicaCount
          value: "2"
      values: |
        replicaCount: 2
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 10
          targetCPUUtilizationPercentage: 70
          targetMemoryUtilizationPercentage: 80
        image:
          repository: sardarabdulwakeel/chat-app
          tag: latest
          pullPolicy: Always
        service:
          type: ClusterIP
          port: 80
          targetPort: 3000
        ingress:
          enabled: true
          className: nginx
          host: chat.sardar.cloud
          serviceClusterIPOnly: true
          annotations:
            nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
            nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
            nginx.ingress.kubernetes.io/affinity: "cookie"
            nginx.ingress.kubernetes.io/session-cookie-name: "chat-app-affinity"
            nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
          tls: false
          tlsSecretName: chat-app-tls
        config:
          PORT: "3000"
          MONGO_URI: "mongodb://mongo:27017/chatapp"
          REDIS_URL: "redis://redis:6379"
        secret:
          jwtSecret: "dev-secret-change-me"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        mongo:
          enabled: true
          image: mongo:7
          storage: 5Gi
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
        redis:
          enabled: true
          image: redis:7
          storage: 1Gi
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      version: v3
    repoURL: https://github.com/wakeel39/chat-app.git
    targetRevision: "<RELEASE_TAG>"
    path: helm/chat-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
