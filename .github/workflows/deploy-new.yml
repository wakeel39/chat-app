name: Kind Server Deployment NEW(Argo CD)

on:
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: sardarabdulwakeel/chat-app
  ARGOCD_APP_NAME: chat-app
  # Host:port that reaches argocd-server (e.g. 35.x.x.x:8080). If empty, set GitHub variable ARGOCD_SERVER.
  ARGOCD_SERVER: ${{ vars.ARGOCD_SERVER }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version (1.0.x)
        id: next-version
        shell: bash
        run: |
          # Find latest tag matching 1.0.* or v1.0.*
          LATEST=$(git tag -l '1.0.*' 'v1.0.*' 2>/dev/null | sed 's/^v//' | sort -V | tail -n1)
          if [ -z "$LATEST" ]; then
            VERSION="1.0.1"
          else
            # Increment patch (e.g. 1.0.1 -> 1.0.2)
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create Helm release folder and update helm snapshot
        shell: bash
        run: |
          VERSION="${{ steps.next-version.outputs.version }}"
          mkdir -p ".helm-releases/${VERSION}"
          cp "helm/chat-app/values.yaml" ".helm-releases/${VERSION}/values.yaml"
          cp "helm/chat-app/values-application-kind.yaml" ".helm-releases/${VERSION}/values-application-kind.yaml"

          # Snapshot: image.tag lives in values-application-kind.yaml (Argo Kind overlay)
          sed -i -E "s/^(\\s*tag:)\\s*.*/\\1 ${VERSION}/" ".helm-releases/${VERSION}/values-application-kind.yaml"

      - name: Build and push Docker image (version + latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.next-version.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Argo CD CLI
        shell: bash
        run: |
          sudo curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo chmod +x /usr/local/bin/argocd


      - name: Create/push git tag
        shell: bash
        run: |
          VERSION="${{ steps.next-version.outputs.version }}"
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Git tag ${TAG} already exists, skipping push"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Create GitHub release for tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.next-version.outputs.version }}"
          TAG="v${VERSION}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping"
          else
            gh release create "${TAG}" --title "${TAG}" --generate-notes
          fi

      - name: Login and update Argo CD (set new image tag)
        shell: bash
        env:
          ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
        run: |
          VERSION="${{ steps.next-version.outputs.version }}"
          TAG="v${VERSION}"
          RENDERED="/tmp/application-kind.rendered.yaml"
          sed "s|<RELEASE_TAG>|${TAG}|g" "argocd/application-kind.yaml" > "${RENDERED}"

          # After login on :8080 (or any non-443 port), the CLI can still dial :443 unless we pin server + grpc-web.
          # See: https://argo-cd.readthedocs.io/en/stable/user-guide/commands/argocd_login/
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy ALL_PROXY all_proxy 2>/dev/null || true
          export ARGOCD_OPTS="--server ${ARGOCD_SERVER} --insecure --grpc-web"

          argocd login "${ARGOCD_SERVER}" --username admin --password "${ARGOCD_PASSWORD}" --insecure --grpc-web
          argocd account get-user-info

          # Issue: "application is deleting" — the Application CR has metadata.deletionTimestamp set.
          # argocd app sync / app set are rejected until deletion finishes OR finalizers are cleared.
          # terminate-op does not help (no sync operation is running).
          
          if ! argocd app get "${ARGOCD_APP_NAME}" --insecure >/dev/null 2>&1; then
            argocd app create --file "${RENDERED}" --upsert --insecure
          fi

          # Point Argo CD at the new Git tag so the UI shows the correct version (targetRevision),
          # not only the Docker image tag via helm-set.
          argocd app set "${ARGOCD_APP_NAME}" \
            --revision "${TAG}" \
            --helm-set image.repository="${DOCKERHUB_IMAGE}" \
            --helm-set image.tag="${VERSION}" \
            --insecure

          SYNC_OK=false
          for attempt in 1 2 3 4 5; do
            echo "Argo CD sync attempt ${attempt}/5"
            if sync_out=$(argocd app sync "${ARGOCD_APP_NAME}" --insecure 2>&1); then
              echo "$sync_out"
              SYNC_OK=true
              break
            fi
            echo "$sync_out"

            if echo "$sync_out" | grep -qi 'application is deleting'; then
              echo "Sync hit deleting state again — waiting for deletion to complete, then recreate if needed..."
              for r in $(seq 1 36); do
                if ! raw=$(argocd app get "${ARGOCD_APP_NAME}" -o json --insecure 2>/dev/null); then
                  argocd app create --file "${RENDERED}" --upsert --insecure
                  break
                fi
                dt=$(echo "$raw" | jq -r '.metadata.deletionTimestamp // empty')
                [ -z "$dt" ] && break
                echo "Still deleting... (${r}/36)"
                sleep 10
              done
              continue
            fi

            if echo "$sync_out" | grep -qi 'another operation is already in progress'; then
              echo "Terminating stuck sync operation and retrying..."
              argocd app terminate-op "${ARGOCD_APP_NAME}" --insecure || true
            fi
            sleep $((attempt * 10))
          done

          if [ "$SYNC_OK" != "true" ]; then
            echo "::error::argocd app sync did not succeed after 5 attempts"
            exit 1
          fi

          argocd app wait "${ARGOCD_APP_NAME}" --health --timeout 300 --insecure || true

     

      

      