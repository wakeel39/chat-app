# Auto-deploy to Kind server on push to main/master
# Requires either: (1) Self-hosted runner with label "kind" on the Kind server, or (2) SSH to Kind server (secrets)
name: Kind Server Deployment

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  KIND_CLUSTER_NAME: chat-app
  IMAGE_NAME: chat-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata and build
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Option A: Run on a self-hosted runner that is on the Kind server (label: kind)
  deploy-kind-self-hosted:
    needs: build-and-push
    runs-on: [self-hosted, kind]
    if: ${{ !cancelled() }}
    steps:
      - name: Log in to GHCR (pull image on Kind server)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and load image into Kind
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
          docker pull $IMAGE
          kind load docker-image $IMAGE --name ${{ env.KIND_CLUSTER_NAME }}
          echo "Loaded $IMAGE into Kind cluster ${{ env.KIND_CLUSTER_NAME }}"

      - name: Restart chat-app deployment
        run: |
          kubectl set image deployment/chat-app chat-app=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest -n chat-app
          kubectl rollout status deployment/chat-app -n chat-app --timeout=120s

  # Option B: SSH into a remote Kind server and run deploy (no self-hosted runner).
  # Enable by adding a repo variable: KIND_SSH_DEPLOY = 'true' (Settings → Actions → Variables).
  # Then add secrets: KIND_SERVER_HOST, SSH_PRIVATE_KEY, and optionally KIND_SERVER_USER.
  deploy-kind-ssh:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && vars.KIND_SSH_DEPLOY == 'true' }}
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H "${{ secrets.KIND_SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Kind server via SSH
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          KIND_CLUSTER_NAME: ${{ env.KIND_CLUSTER_NAME }}
        run: |
          USER="${{ secrets.KIND_SERVER_USER || 'ec2-user' }}"
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=accept-new "${USER}@${{ secrets.KIND_SERVER_HOST }}" \
            "docker pull $GHCR_IMAGE && \
             kind load docker-image $GHCR_IMAGE --name $KIND_CLUSTER_NAME && \
             kubectl set image deployment/chat-app chat-app=$GHCR_IMAGE -n chat-app && \
             kubectl rollout status deployment/chat-app -n chat-app --timeout=120s && \
             echo 'Deployed to Kind.'"
        continue-on-error: true
